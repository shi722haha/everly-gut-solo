<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>肠胃脆弱 · 单页对比版</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  body{ background:#D9DEE1; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
        display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:16px 12px; color:#2A312E; }

  /* ---- 手机外壳：固定高度，内部滚动 ---- */
  .phone{ width:392px; max-width:100%; height:812px; max-height:94vh; background:#ECEFF1;
          border-radius:30px; box-shadow:0 18px 50px rgba(40,60,55,.22); overflow:hidden;
          display:flex; flex-direction:column; }

  .head{ flex:none; padding:14px 16px 0; background:#ECEFF1; }
  .nav{ display:flex; align-items:center; justify-content:space-between; }
  .nav .back{ width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
              font-size:17px;color:#46504A;box-shadow:0 2px 8px rgba(70,120,105,.08); }
  .nav h1{ font-size:17px; font-weight:600; }
  .nav .more{ font-size:17px; color:#9AA4A0; letter-spacing:2px; }

  /* 人群切换：六个平分宽度，一行全显示，谁都不切 */
  .people{ display:flex; gap:5px; padding:12px 0 10px; }
  .pchip{ flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:4px;
          padding:8px 2px; border-radius:14px; background:#fff; border:1.5px solid transparent;
          box-shadow:0 2px 8px rgba(70,120,105,.05); cursor:pointer; transition:.15s; }
  .pchip .pe{ font-size:20px; line-height:1; }
  .pchip .pn{ font-size:9.5px; color:#6A746E; font-weight:600; text-align:center; line-height:1.15; }
  .pchip.on{ border-color:#4FC0A1; background:#F2FBF8; }
  .pchip.on .pn{ color:#2F8E72; }

  /* 滚动区 */
  .scrollwrap{ flex:1; position:relative; overflow:hidden; }
  .scroll{ height:100%; overflow-y:auto; padding:4px 16px 30px; scrollbar-width:thin; }
  .scroll::-webkit-scrollbar{ width:5px; }
  .scroll::-webkit-scrollbar-thumb{ background:#C7D0CB; border-radius:3px; }
  .fade{ position:absolute; left:0; right:0; bottom:0; height:34px; pointer-events:none;
         background:linear-gradient(transparent,#ECEFF1); }

  /* 总营养分 hero */
  .hero{ display:flex; gap:14px; align-items:center; background:#fff; border-radius:18px;
         padding:15px; margin:2px 0 10px; box-shadow:0 3px 12px rgba(70,120,105,.06); }
  .ring{ width:74px; height:74px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; }
  .ring .rin{ width:58px; height:58px; border-radius:50%; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .rn{ font-size:23px; font-weight:700; line-height:1; }
  .ring .rl{ font-size:9px; color:#9AA4A0; margin-top:2px; }
  .hx{ flex:1; min-width:0; }
  .hx .ht{ font-size:11.5px; font-weight:700; color:#46504A; }
  .hx .ht b{ color:#2F8E72; }
  .hx .hd{ font-size:12.5px; line-height:1.5; color:#525C55; margin:5px 0 7px; }
  .hx .htag{ font-size:9.5px; color:#9DA8A2; background:#F3F7F5; border-radius:6px; padding:3px 7px; display:inline-block; }

  /* 今天吃了什么 · 分餐 */
  .meal{ background:#fff; border-radius:16px; padding:11px 15px; margin:0 0 6px;
         box-shadow:0 3px 12px rgba(70,120,105,.05); }
  .meal .mt{ font-size:11.5px; font-weight:700; color:#9AA4A0; letter-spacing:.5px; margin-bottom:4px; }
  .meal .mt b{ color:#2F8E72; }
  .slot{ display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid #F4F7F5; }
  .slot:last-child{ border-bottom:none; padding-bottom:1px; }
  .slot .si{ font-size:15px; width:20px; text-align:center; flex:none; }
  .slot .sn{ font-size:11px; color:#9AA4A0; font-weight:600; width:30px; flex:none; }
  .slot .sit{ display:flex; flex-wrap:wrap; gap:5px; }
  .slot .it{ background:#F3F7F5; border-radius:7px; padding:2px 9px; font-size:11.5px; color:#525C55; }

  /* hero 里的 AI 总结 + 趋势 */
  .hx .ait{ font-size:13.5px; font-weight:700; color:#2E3A35; margin-bottom:4px; }
  .spark{ display:flex; align-items:center; gap:6px; margin-top:7px; }
  .spark .sl{ font-size:9.5px; color:#A8B2AC; }

  /* 今日餐食 · AIGC 图卡（横滑） */
  .mealhd{ font-size:13px; font-weight:700; color:#46504A; margin:6px 4px 8px;
           display:flex; align-items:center; justify-content:space-between; }
  .mealhd .mr{ font-size:10.5px; color:#A8B2AC; font-weight:500; }
  /* 菜谱「展开另外N道」按钮 */
  .reciperow.collapsed{ display:none; }
  .deepbody.collapsed{ display:none; }
  .foldmore{ text-align:center; font-size:12px; font-weight:700; color:#2F8E72; background:#EAF6F0;
             border:1px solid #D7EBE2; border-radius:12px; padding:9px; margin:2px 0 8px; cursor:pointer; }
  .foldmore:active{ background:#DCEFE6; }

  /* ===== 小白简版（零指标，按画像分层的表层）===== */
  .modebar{ background:#fff; border-radius:14px; padding:7px; margin:2px 0 12px; box-shadow:0 3px 12px rgba(70,120,105,.06); }
  .modebar .mrow{ display:flex; gap:7px; }
  .mbtn{ flex:1; border:none; background:#F2F5F4; color:#6A746E; font-size:12.5px; font-weight:700; padding:10px; border-radius:10px; cursor:pointer; }
  .mbtn.on{ background:#2F8E72; color:#fff; }
  .mhint{ font-size:9.5px; color:#AEB6B1; text-align:center; margin-top:6px; }
  .verdict{ background:#fff; border-radius:18px; padding:17px 16px; margin-bottom:14px; box-shadow:0 3px 12px rgba(70,120,105,.07); border-left:5px solid #E0894A; }
  .verdict .vbig{ font-size:20px; font-weight:800; color:#D9803F; }
  .verdict .vsum{ font-size:13.5px; line-height:1.65; color:#46504A; margin-top:9px; }
  /* 今天 · 4 档评价（像 oura/bevel 最上面，但不要数字） */
  .tscale{ background:#fff; border-radius:18px; padding:16px 16px 17px; margin-bottom:14px; box-shadow:0 3px 12px rgba(70,120,105,.07); }
  .tslabel{ font-size:13px; font-weight:700; color:#8A938D; }
  .tsnow{ font-size:21px; font-weight:800; margin:3px 0 12px; }
  .tsbar{ display:flex; gap:5px; }
  .tseg{ flex:1; text-align:center; font-size:11.5px; font-weight:700; color:#AEB6B1;
         background:#F1F4F2; border-radius:9px; padding:9px 2px 8px; position:relative; transition:.2s; }
  .tseg.on{ color:#fff; box-shadow:0 3px 9px rgba(224,137,74,.28); transform:translateY(-1px); }
  .tseg.on::after{ content:"●"; position:absolute; top:-9px; left:50%; transform:translateX(-50%); font-size:8px; }
  .tssum{ font-size:13.5px; line-height:1.65; color:#46504A; margin-top:13px; }
  .simhead{ font-size:15px; font-weight:800; margin:16px 4px 10px; display:flex; align-items:center; gap:6px; }
  .simhead.no{ color:#D9803F; } .simhead.ok{ color:#2F8E72; }
  .fcard{ background:#fff; border-radius:15px; padding:13px 15px; margin-bottom:9px; box-shadow:0 3px 12px rgba(70,120,105,.055); transition:opacity .2s; }
  .fcard .ff{ display:flex; justify-content:space-between; align-items:center; }
  .fcard .ffn{ font-size:16px; font-weight:800; color:#2E3A35; }
  .fcard .fmeal{ font-size:10px; color:#A8B2AC; font-weight:700; background:#F3F7F5; border-radius:6px; padding:2px 7px; flex:none; }
  .fcard .fw{ font-size:13px; color:#525C55; margin-top:7px; line-height:1.55; }
  .cprompt{ font-size:11.5px; color:#8A938D; font-weight:600; margin-top:10px; }
  .choice{ display:flex; gap:8px; margin-top:7px; }
  .cbtn{ flex:1; font-size:11.5px; font-weight:700; color:#6A746E; background:#F6F8F7;
         border:1.5px solid #E6EBE9; border-radius:10px; padding:9px 4px; cursor:pointer; }
  .cbtn.ok.sel{ background:#E7F4EC; border-color:#9FD3B6; color:#2F8E72; }
  .cbtn.meh.sel{ background:#EEF2F0; border-color:#C7D0CB; color:#46504A; }
  .cbtn.bad.sel{ background:#FBEFE6; border-color:#EEC4A4; color:#D9803F; }
  .corrnote{ display:none; font-size:11.5px; color:#2F8E72; font-weight:700; margin-top:9px; }
  /* 折叠在因素行里的「多/少」条码 + 说明 */
  .detail .track{ height:7px; }
  .detail .gl{ display:flex; justify-content:space-between; font-size:9px; color:#BCC5C0; margin-top:4px; }
  .sstat{ font-size:12.5px; font-weight:700; margin-top:10px; }
  .swhy{ font-size:12px; color:#525C55; line-height:1.55; margin-top:8px; }
  .swhy b{ color:#3E8E73; font-weight:700; }
  .ssrc{ margin-top:7px; }
  /* 直接指令行 */
  .actline{ display:flex; align-items:center; gap:8px; }
  .actchip{ flex:none; font-size:11px; font-weight:800; padding:3px 10px; border-radius:8px; }
  .actchip.neg{ color:#fff; background:#E0894A; }
  .actchip.pos{ color:#fff; background:#3E9E78; }
  .actchip.ok{ color:#6A746E; background:#EEF2F0; }
  .actsub{ font-size:12.5px; color:#525C55; line-height:1.5; margin-top:6px; }

  /* 意图识别卡 */
  .intent{ background:linear-gradient(180deg,#F2FBF7,#fff 55%); border:1px solid #D5EADF; border-radius:16px; padding:14px 15px; margin-bottom:12px; box-shadow:0 3px 12px rgba(70,120,105,.06); }
  .intent .idt{ font-size:13.5px; font-weight:700; color:#2E3A35; margin:8px 0 11px; line-height:1.55; }
  .ibtns{ display:flex; gap:9px; }
  .ibtn{ flex:1; font-size:12.5px; font-weight:700; border-radius:10px; padding:11px; cursor:pointer; border:1.5px solid transparent; }
  .ibtn.yes{ background:#2F8E72; color:#fff; }
  .ibtn.no{ background:#F2F5F4; color:#6A746E; border-color:#E6EBE9; }
  .iplan{ display:none; }
  .iplanhd{ font-size:12.5px; font-weight:700; color:#2F8E72; margin-bottom:9px; }
  .goal{ font-size:13px; color:#46504A; line-height:1.55; background:#F4F8F6; border-radius:10px; padding:9px 12px; margin-bottom:7px; }
  .goal b{ color:#2F8E72; }
  /* 年龄分析 */
  .agelines{ font-size:12.5px; color:#46504A; line-height:1.65; }
  .agelines > div{ margin-bottom:5px; }
  .agelines b{ color:#2E3A35; }
  /* 小按钮 */
  .minibtn{ margin-top:11px; font-size:11.5px; font-weight:700; color:#7C867F; background:#F4F6F5; border:1px solid #E6EBE9; border-radius:9px; padding:8px 12px; cursor:pointer; }
  .minibtn:active{ background:#EAEFEC; }
  /* 目标 / 冲刺卡 */
  .goalcard{ background:linear-gradient(180deg,#FDF6EE,#fff 55%); border:1px solid #F0DEC8; border-radius:16px; padding:14px 15px; margin-bottom:12px; box-shadow:0 3px 12px rgba(120,90,40,.06); }
  .gmain{ font-size:15px; font-weight:800; color:#B5762E; margin:9px 0 10px; }
  .gbar{ height:9px; background:#F0E6D8; border-radius:5px; overflow:hidden; }
  .gfill{ height:9px; background:linear-gradient(90deg,#E8B66A,#D99A3C); border-radius:5px; }
  .gprog{ font-size:12px; color:#8A7A60; margin-top:8px; font-weight:600; }
  .gprog b{ color:#B5762E; }
  .gchip{ font-size:11.5px; color:#B5762E; background:#FBF1E3; border:1px solid #EFD9BC; border-radius:8px; padding:5px 10px; cursor:pointer; }
  .goalmore.collapsed{ display:none; }
  .discmore.collapsed{ display:none; }
  .gtoggle{ font-size:11.5px; font-weight:700; color:#B5762E; margin-top:10px; cursor:pointer; }
  .mealrow{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:1px 0 8px; }
  .mcard{ background:#fff; border-radius:15px; overflow:hidden;
          box-shadow:0 3px 12px rgba(70,120,105,.07); }
  .mcard .imgwrap{ position:relative; height:84px; background:#E9EFEC; }
  .mcard img{ width:100%; height:84px; object-fit:cover; display:block; transition:opacity .4s; }
  .mcard .ph{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
              font-size:30px; background:linear-gradient(135deg,#EDF3F0,#E3ECE8); }
  .mcard .mc{ padding:8px 10px 10px; }
  .mc .mh{ font-size:10px; color:#9AA4A0; font-weight:600; display:flex; justify-content:space-between; }
  .mc .mn{ font-size:12.5px; font-weight:600; margin:3px 0 7px; line-height:1.25; color:#2E3A35; }
  .qtag{ font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:6px; display:inline-block; }

  /* 宏量 + 净能量（Bevel） */
  .macro{ background:#fff; border-radius:16px; padding:12px 14px; margin:0 0 6px; box-shadow:0 3px 12px rgba(70,120,105,.05); }
  .macro .mt{ font-size:11px; font-weight:700; color:#9AA4A0; letter-spacing:.5px; margin-bottom:9px; display:flex; justify-content:space-between; }
  .macro .mt .net{ color:#6A746E; font-weight:600; }
  .mg{ display:flex; gap:12px; }
  .mg .one{ flex:1; }
  .mg .lab{ font-size:11px; color:#6A746E; display:flex; justify-content:space-between; margin-bottom:4px; }
  .mg .lab b{ font-weight:700; color:#2E3A35; }
  .mg .bar{ height:5px; background:#EEF2F0; border-radius:3px; overflow:hidden; }
  .mg .bf{ height:5px; border-radius:3px; }

  /* 换着吃 · 菜谱（小卡 + 胃之书） */
  .rcard{ display:flex; gap:11px; background:#fff; border-radius:15px; padding:10px; margin-bottom:8px; box-shadow:0 3px 12px rgba(70,120,105,.05); }
  .rcard .rimg{ width:76px; height:76px; border-radius:11px; object-fit:cover; flex:none; background:#E9EFEC; }
  .rx{ flex:1; min-width:0; }
  .rx .rn{ font-size:13.5px; font-weight:700; color:#2E3A35; }
  .rx .cui{ font-size:9.5px; color:#2F8E72; background:#EFF8F4; border:1px solid #DDEEE7; border-radius:5px; padding:1px 6px; margin-left:6px; font-weight:600; }
  .rx .rf{ font-size:11.5px; color:#525C55; margin:5px 0; line-height:1.45; }
  .rx .rs{ font-size:10.5px; color:#B5762E; background:#FBF4E9; border-radius:6px; padding:3px 8px; display:inline-flex; gap:4px; }

  .creed{ font-size:12px; line-height:1.6; color:#7C867F; margin:10px 4px 12px; }
  .creed b{ color:#2F8E72; font-weight:600; }

  /* 深度块 = AI 洞察模块：肠胃影响因素 / 产后身体账本（这两类做更厚） */
  .deep{ background:#fff; border-radius:16px; padding:13px 15px; margin:0 0 10px;
         box-shadow:0 3px 12px rgba(70,120,105,.06); border:1px solid #E6F0EB; }
  .deep.insight{ background:linear-gradient(180deg,#F2FBF7,#FFFFFF 55%); border:1px solid #D5EADF; }
  .ai-eyebrow{ display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700;
               color:#3E9E78; letter-spacing:.3px; background:#E7F5EE; border-radius:7px; padding:3px 9px; }
  .ai-lead{ font-size:12px; line-height:1.6; color:#46504A; background:#fff; border:1px solid #E4F0EA;
            border-radius:11px; padding:10px 12px; margin:9px 0 12px; box-shadow:0 1px 6px rgba(70,120,105,.05); }
  .ai-mini{ font-size:11px; line-height:1.55; color:#8A938D; margin:-4px 2px 11px; }
  .deep .dt{ font-size:12.5px; font-weight:700; color:#2F8E72; margin:9px 0 4px; }
  .tier{ margin-bottom:10px; }
  .tier .th{ font-size:11px; font-weight:700; color:#46504A; margin-bottom:5px; display:flex; align-items:center; gap:6px; }
  .tier .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .tier .sub{ font-weight:500; color:#AEB6B1; font-size:9.5px; }
  .chips{ display:flex; flex-wrap:wrap; gap:5px; }
  .chips .c{ font-size:11px; padding:3px 9px; border-radius:8px; }
  .ldg .row2{ display:flex; gap:9px; margin-bottom:8px; font-size:12px; line-height:1.5; }
  .ldg .lk{ flex:none; width:42px; font-weight:700; color:#2F8E72; }
  .ldg .lv{ color:#525C55; } .ldg .lv b{ color:#2E3A35; font-weight:700; }
  .th2{ font-size:10.5px; font-weight:700; color:#46504A; margin:10px 0 6px; }
  .dnote{ font-size:10.5px; color:#9AA4A0; line-height:1.55; margin-top:9px; padding-top:9px; border-top:1px dashed #ECF1EE; }

  /* 可拖拽排序的板块 */
  .draghint{ font-size:10px; color:#AEB6B1; margin:0 4px 8px; display:flex; align-items:center; gap:4px; }
  .block{ position:relative; border-radius:16px; transition:opacity .15s, box-shadow .15s; }
  .block.dragging{ opacity:.4; box-shadow:0 8px 24px rgba(40,70,60,.18); }
  .block + .block{ margin-top:2px; }
  .grip{ position:absolute; top:3px; right:5px; z-index:3; font-size:12px; color:#B6C0BA;
         background:#fff; border:1px solid #E8EFEB; border-radius:7px; padding:1px 7px; line-height:18px;
         cursor:grab; user-select:none; box-shadow:0 1px 4px rgba(70,120,105,.08); }
  .grip:active{ cursor:grabbing; }

  .sechead{ font-size:11.5px; font-weight:700; color:#9AA4A0; letter-spacing:.5px; margin:14px 4px 8px; }

  /* 因素行 */
  .row{ background:#fff; border-radius:16px; padding:13px 14px; margin-bottom:8px;
        box-shadow:0 3px 10px rgba(70,120,105,.04); cursor:pointer; transition:.15s; }
  .row:active{ transform:scale(.99); }
  .rtop{ display:flex; align-items:center; gap:11px; }
  .rtop .em{ font-size:19px; width:24px; text-align:center; flex:none; }
  .col{ flex:1; min-width:0; }
  .col .nm{ font-size:14.5px; font-weight:600; }
  .col .td{ font-size:10.5px; color:#9AA4A0; margin-top:2px; }
  .col .td b{ font-weight:600; }

  /* 区间带 gauge */
  .gauge{ width:78px; flex:none; }
  .track{ position:relative; height:6px; background:#EEF2F0; border-radius:4px; margin-top:3px; }
  .band{ position:absolute; top:0; height:6px; background:#CDEBDD; border-radius:3px; }
  .mark{ position:absolute; top:50%; width:11px; height:11px; border-radius:50%;
         transform:translate(-50%,-50%); border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .gl{ display:flex; justify-content:space-between; font-size:8.5px; color:#BCC5C0; margin-top:3px; }

  .stat{ flex:none; width:52px; text-align:right; }
  .stat .sv{ font-size:14px; font-weight:700; }
  .stat .sl{ font-size:9.5px; margin-top:1px; }
  .chev{ color:#C7D0CB; font-size:14px; flex:none; transition:.2s; margin-left:2px; }
  .row.open .chev{ transform:rotate(90deg); }

  .pos{ color:#37A06E; } .neg{ color:#E07B43; } .ok{ color:#37A06E; } .mid{ color:#A0AAA4; }
  .mk-lo{ background:#E9B25C; } .mk-ok{ background:#37A06E; } .mk-hi{ background:#E07B43; }

  .detail{ max-height:0; overflow:hidden; transition:max-height .25s ease; }
  .row.open .detail{ max-height:360px; }
  .dinner{ padding:12px 1px 2px; margin-top:11px; border-top:1px dashed #ECF1EE; }
  .drow{ display:flex; gap:8px; margin-bottom:8px; font-size:12px; line-height:1.55; }
  .drow:last-child{ margin-bottom:0; }
  .dlab{ flex:none; width:52px; font-weight:700; color:#3E8E73; }
  .dval{ color:#525C55; }
  .src{ display:inline-flex; align-items:center; gap:4px; background:#F3F7F5; border:1px solid #E3EBE7;
        border-radius:7px; padding:2px 8px; font-size:10.5px; color:#5C857A; font-weight:600; }
  .src::before{ content:"📖"; font-size:9px; }

  .foot{ text-align:center; font-size:10.5px; color:#AEB6B1; margin:16px 4px 4px; line-height:1.7; }
</style>
</head>
<body>
<div class="phone">

  <div class="head">
    <div class="nav">
      <div class="back">‹</div>
      <h1>今天的食物评分 · 单页</h1>
      <div class="more">···</div>
    </div>
    <div class="people" id="people"></div>
  </div>

  <div class="scrollwrap">
    <div class="scroll" id="scroll"></div>
    <div class="fade"></div>
  </div>

</div>

<script>

function aimg(name){

  return (k ? `img/${k}.jpg` : "img/rice.jpg") + `?v=${BUILD}`;

function spark(sc){
  const t=[sc-7,sc-2,sc-5,sc+3,sc-1,sc+2,sc].map(v=>Math.max(35,Math.min(98,v)));
  const w=72,h=24, mx=Math.max(...t),mn=Math.min(...t),rg=Math.max(1,mx-mn);
  const pts=t.map((v,i)=>`${(i/(t.length-1)*w).toFixed(1)},${(h-((v-mn)/rg)*(h-5)-2.5).toFixed(1)}`).join(" ");
  const lx=w, ly=(h-((t[t.length-1]-mn)/rg)*(h-5)-2.5).toFixed(1);
  return `<svg width="${w}" height="${h}" style="overflow:visible">
    <polyline points="${pts}" fill="none" stroke="#4FC0A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="2.6" fill="#37A06E"/></svg>`;
}

function attachDrag(){
  const cont = document.getElementById("blocks"); if(!cont) return;
  cont.querySelectorAll(".block").forEach(bl=>{
    bl.addEventListener("dragstart", e=>{ bl.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
    bl.addEventListener("dragend", ()=>{ bl.classList.remove("dragging"); saveOrder(); });
  });
  cont.addEventListener("dragover", e=>{
    e.preventDefault();
    const dragging = cont.querySelector(".dragging"); if(!dragging) return;
    const after = afterEl(cont, e.clientY);
    if(after == null) cont.appendChild(dragging); else cont.insertBefore(dragging, after);
  });
}

function markClass(mark, band){
  if(mark < band[0]-2) return "mk-lo";
  if(mark > band[1]+2) return "mk-hi";
  return "mk-ok";
}
/* 总营养分：按每条「今日落点 vs 区间」的贴合度，用重要度(|分|)加权平均 → 0–100。
   与下面的因素行同源，不是另给的数。 */
function computeScore(p){
  let sw=0, sf=0;
  [...p.priority, ...p.base].forEach(f=>{
    let fit;
    if(f.mark < f.band[0]) fit = Math.max(0, 100 - (f.band[0]-f.mark)*1.6);
    else if(f.mark > f.band[1]) fit = Math.max(0, 100 - (f.mark-f.band[1])*1.6);
    else fit = 100;
    const w = Math.abs(f.score) + 1;
    sw += w; sf += fit*w;
  });
  return Math.round(sf/sw);
}
function scoreColor(s){ return s>=78 ? "#4FC0A1" : s>=64 ? "#E3B34D" : "#E0894A"; }
function scoreWord(s){ return s>=78 ? "状态不错" : s>=64 ? "可以更好" : "今天需留意"; }

        ${x.recipes.length>1 ? `<div class="foldmore" onclick="toggleRecipes(this)">${recipeCollapsed?`▾ 展开另外 ${x.recipes.length-1} 道`:"▴ 收起"}</div>` : ""}`,
  };
  if(x.deep) B.deep = deepHTML(x.deep);
  const order = [...BLOCK_ORDER.filter(k=>B[k]), ...Object.keys(B).filter(k=>!BLOCK_ORDER.includes(k))];
  const blocks = order.map(k =>
    `<div class="block" draggable="true" data-key="${k}">${B[k]}</div>`).join("");

  document.getElementById("scroll").innerHTML = modeBar + `
    <div class="hero">
      <div class="ring" style="background:conic-gradient(${col} 0 ${sc}%, #EAF1EE ${sc}% 100%)">
        <div class="rin"><div class="rn" style="color:${col}">${sc}</div><div class="rl">营养分</div></div>
      </div>
      <div class="hx">
        <div class="ait">${x.title}</div>
        <div class="hd">${p.read}</div>
        <div class="spark">${spark(sc)}<span class="sl">近 7 天 · ${scoreWord(sc)}</span></div>
      </div>
    </div>
    <div class="creed">${p.creed}</div>
    <div class="draghint">按住卡片可拖动排序（顺序会记住）</div>
    <div id="blocks">${blocks}</div>

    <div class="foot">营养分 = 按每条“今日落点 vs 你的区间”加权，与因素行同源。<br>餐食图为 AI 生成示意；菜谱按八大菜系 + 食材替换思路推荐。<br>卡片顺序可拖动调整。所有区间与加减分基于公开科学，可追溯。wellness 健康管理，不做医疗诊断。<br><span class="build" style="color:#B9C2BC">构建 06-13 · 今日4档评价 + 小白版降AI味</span></div>`;
  attachDrag();
  document.getElementById("scroll").scrollTop = 0;
}
function select(i){ active=i; renderPeople(); renderBody(); }
function toggle(el){ el.classList.toggle("open"); }

renderPeople(); renderBody();
</script>
